<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Калькулятор опрыскивателя</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1>Калькулятор опрыскивателя</h1>
    <button id="menuButton">☰</button>
  </header>

  <nav class="main-tabs">
    <button class="tab-btn active" data-tab="calc">Расчёт</button>
    <button class="tab-btn" data-tab="weather">Погода</button>
    <button class="tab-btn" data-tab="treatments">Обработки</button>
    <button class="tab-btn" data-tab="stock">Склад</button>
  </nav>

  <main>
    <section id="tab-calc" class="tab-content active">
      <div class="card">
        <input id="cultureInput" placeholder="Культура">
        <input id="areaInput" type="number" placeholder="Площадь, га">
        <input id="normInput" type="number" value="400" placeholder="л/га">
        <input id="speedInput" type="number" value="8" placeholder="км/ч">
        <input id="spacingInput" type="number" value="4" placeholder="м">
        <input id="nozzlesInput" type="number" value="14" placeholder="шт">
        <input id="tankInput" type="number" value="3000" placeholder="бак">
        <select id="blockSelect"></select>
        <div id="blockSelectWrap"></div>
      </div>
      <div class="card">
        <div id="resultCulture"></div>
        <div id="resultArea"></div>
        <div id="resultLiters"></div>
        <div id="resultTanks"></div>
        <div id="resultTotalFlow"></div>
        <div id="resultFlowPerNozzle"></div>
        <div id="resultPressure"></div>
        <div id="pressureStatus"></div>
        <div id="pressureLower"></div>
        <div id="pressureUpper"></div>
      </div>
    </section>

    <section id="tab-weather" class="tab-content">
      <input id="weatherCity" placeholder="Город">
      <input id="weatherLat" type="number" value="53.414120">
      <input id="weatherLon" type="number" value="24.678197">
      <button id="weatherLoadBtn">Обновить погоду</button>
      <button id="airReloadBtn">Обновить AirMQ</button>
      <div id="weatherPlace"></div>
      <div id="weatherStatus"></div>
      <div id="weatherCards"></div>
      <div id="airInfo"></div>
      <div id="airStatus"></div>
      <div id="airTemp"></div>
      <div id="airHum"></div>
      <div id="airPms1"></div>
      <div id="airPms25"></div>
      <div id="airPms10"></div>
      <div id="airTime"></div>
    </section>

    <section id="tab-treatments" class="tab-content">
      <select id="treatmentPlaceFilter"></select>
      <select id="treatmentChemFilter"></select>
      <select id="treatmentTypeFilter"></select>
      <div id="treatmentsStatus"></div>
      <div id="lastTreatment"></div>
      <div id="treatmentsDays"></div>
    </section>

    <section id="tab-stock" class="tab-content">
      <select id="stockTypeFilter"></select>
      <select id="stockSortBy">
        <option value="name">По названию</option>
        <option value="type">По виду химии</option>
        <option value="has_desc">По остатку ↓</option>
        <option value="has_asc">По остатку ↑</option>
        <option value="used_desc">По расходу ↓</option>
      </select>
      <div id="stockStatus"></div>
      <table><tbody id="stockBody"></tbody></table>
    </section>
  </main>

  <section id="panel-measurements" class="panel-content">
    <input id="measurementPressure">
    <input id="measurementFlow">
    <button id="saveMeasurementBtn">Сохранить</button>
    <table><tbody id="measurementsBody"></tbody></table>
  </section>

  <section id="panel-blocks" class="panel-content">
    <input id="blockName">
    <input id="blockCulture">
    <input id="blockYear">
    <input id="blockRows">
    <input id="blockScheme">
    <input id="blockCount">
    <input id="blockArea">
    <button id="saveBlockBtn">Сохранить участок</button>
    <div id="blockEditNotice"></div>
    <table><tbody id="blocksBody"></tbody></table>
  </section>

  <div id="sidePanel"></div>
  <button id="closeMenuButton"></button>
  <div id="overlay"></div>

<script src="script.js"></script>
</body>
</html>
